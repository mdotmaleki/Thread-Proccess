<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>پروژه پردازش موازی</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f2f2f2;
            height: 100vh;
            margin: 0;
            padding: 10px;
        }
        pre {
            white-space: pre-wrap;
            font-family: monospace;
        }
        #output-box {
            height: 48%;
            overflow-y: auto;
        }
        #description-box {
            height: 48%;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<div class="container-fluid h-100">
    <div class="row h-100">

        <!-- ستون راست -->
        <div class="col-4">

            <div class="card shadow-sm h-100">
                <div class="card-body">

                    <h4 class="text-center mb-3">پروژه نهایی پردازش موازی</h4>
                    <h5 class="text-center mb-1">تستتتتتتتتتتتت</h5>
                    <h6 class="text-center mb-4">شماره دانشجویی: 40411415015</h6>

                    <!-- روش -->
                    <div class="mb-3">
                        <label class="form-label">روش:</label>
                        <select id="method" class="form-select">
                            <option value="">انتخاب کنید...</option>
                            <option value="thread">Thread</option>
                            <option value="process">Process</option>
                        </select>
                    </div>

                    <!-- ابزار -->
                    <div class="mb-3">
                        <label class="form-label">ابزار همزمانی:</label>
                        <div id="tools">
                            <select id="tool" class="form-select" disabled>
                                <option value="">ابتدا روش را انتخاب کنید</option>
                            </select>
                        </div>
                    </div>

                    <!-- سناریو -->
                    <div class="mb-3">
                        <label class="form-label">سناریو:</label>
                        <select id="scenario" class="form-select">
                            <option value="">ابتدا ابزار را انتخاب کنید</option>
                        </select>
                    </div>

                    <button id="run-btn" class="btn btn-primary w-100">اجرا</button>

                </div>
            </div>

        </div>

        <!-- ستون چپ -->
        <div class="col-8 d-flex flex-column">

            <div id="output-box" class="card mb-2 shadow-sm">
                <div class="card-header">خروجی</div>
                <div class="card-body">
                    <div id="output-content">
                        <pre></pre>
                    </div>
                </div>
            </div>

            <div id="description-box" class="card shadow-sm">
                <div class="card-header">توضیحات</div>
                <div class="card-body">
                    <p></p>
                </div>
            </div>

        </div>

    </div>
</div>

<script>
    const methodSelect = document.getElementById("method");
    const toolsContainer = document.getElementById("tools");
    const scenarioSelect = document.getElementById("scenario");
    const runBtn = document.getElementById("run-btn");
    const outputContent = document.getElementById("output-content");

    // وقتی روش تغییر می‌کند → ابزارها را از سرور بگیر
    methodSelect.addEventListener("change", function () {
        const method = this.value;

        scenarioSelect.innerHTML = `<option value="">ابتدا ابزار را انتخاب کنید</option>`;

        if (!method) {
            toolsContainer.innerHTML = `
                <select id="tool" class="form-select" disabled>
                    <option value="">ابتدا روش را انتخاب کنید</option>
                </select>
            `;
            return;
        }

        fetch(`/get-tools?method=${method}`)
            .then(res => res.json())
            .then(data => {
                const tools = data.tools;

                let html = `<select id="tool" class="form-select">`;
                tools.forEach(t => html += `<option value="${t}">${t}</option>`);
                html += `</select>`;

                toolsContainer.innerHTML = html;

                // وقتی ابزار تغییر کرد → سناریوها را بگیر
                document.getElementById("tool").addEventListener("change", function () {
                    const tool = this.value;

                    fetch(`/get-scenarios?method=${method}&tool=${tool}`)
                        .then(res => res.json())
                        .then(data => {
                            scenarioSelect.innerHTML = "";
                            data.scenarios.forEach(s => {
                                scenarioSelect.innerHTML += `<option value="${s.id}">${s.title}</option>`;
                            });
                        });
                });
            });
    });

    // اجرای سناریو
    runBtn.addEventListener("click", function () {
        const method = document.getElementById("method").value;
        const tool = document.getElementById("tool")?.value;
        const scenario = document.getElementById("scenario").value;

        if (!method || !tool) {
            outputContent.innerHTML = `<pre>لطفاً روش و ابزار را انتخاب کنید.</pre>`;
            return;
        }

        outputContent.innerHTML = `<pre>در حال اجرا...</pre>`;
        document.querySelector("#description-box .card-body").innerHTML = "<p></p>";

        fetch("/run", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                method: method,
                tool: tool,
                scenario: scenario
            })
        })
        .then(res => res.json())
        .then(data => {

            if (data.status === "error") {
                outputContent.innerHTML = `<pre>${data.message}</pre>`;
            } else {
                let text = "";
                data.logs.forEach(line => text += line + "\n");
                outputContent.innerHTML = `<pre>${text}</pre>`;
            }

            document.querySelector("#description-box .card-body").innerHTML =
                `<p>${data.description}</p>`;
        });
    });
</script>

</body>
</html>
